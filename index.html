<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>오늘의 찰칵</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #15181F; --paper: #F6F5F0; --flash: #FFD338;
    --pass: #3DDC97; --fail: #FF5C48; --dim: #8A8D96;
  }
  body {
    height: 100vh; height: 100dvh; overflow: hidden;
    background: var(--ink); color: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 0;
  }
  .topbar { width: 100%; max-width: 420px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 12px 16px 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .backbtn {
    flex: 0 0 auto; width: auto; padding: 6px 12px; font-size: 13px; font-weight: 500;
    border-radius: 8px; background: #2A2F3B; color: var(--paper);
  }
  .logo { font-family: 'Black Han Sans', sans-serif; font-size: 22px; letter-spacing: 0.5px; color: var(--flash); }
  .datechip { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--dim); }
  .counter { width: 100%; max-width: 420px; display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .counter-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 44px; font-weight: 600;
    color: var(--flash); background: #1E222C; border: 1px solid #2A2F3B;
    border-radius: 8px; padding: 2px 14px; min-width: 96px; text-align: center; letter-spacing: 2px;
  }
  .counter-meta { display: flex; flex-direction: column; gap: 3px; }
  .counter-label { font-size: 13px; color: var(--dim); letter-spacing: 2px; }
  .tier { font-family: 'IBM Plex Mono', monospace; font-size: 15px; }
  .best { font-size: 14px; color: var(--dim); }
  .best b { color: var(--pass); font-family: 'IBM Plex Mono', monospace; }
  .fails { font-size: 13px; color: var(--dim); }
  .fails b { color: var(--fail); font-family: 'IBM Plex Mono', monospace; }
  .failscope { font-size: 11px; color: var(--dim); opacity: 0.8; }
  .themecard {
    width: 100%; max-width: 420px; background: var(--flash); color: var(--ink);
    border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
  }
  .themecard-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .themecard .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 3px; opacity: 0.7; }
  .progress {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    background: var(--ink); color: var(--flash); padding: 3px 12px; border-radius: 20px; letter-spacing: 1px;
  }
  .progress.clear { color: var(--pass); }
  .themecard h1 { font-family: 'Black Han Sans', sans-serif; font-size: 30px; line-height: 1.2; }
  .frame {
    position: relative; width: 100%; max-width: 420px; aspect-ratio: 4 / 3;
    background: #0D0F14; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; margin-bottom: 16px;
  }
  .frame img, .frame video { width: 100%; height: 100%; object-fit: cover; }
  .frame .empty { color: var(--dim); font-size: 14px; text-align: center; line-height: 1.7; }
  .corner { position: absolute; width: 26px; height: 26px; border-color: var(--flash); border-style: solid; border-width: 0; }
  .corner.tl { top: 10px; left: 10px; border-top-width: 3px; border-left-width: 3px; }
  .corner.tr { top: 10px; right: 10px; border-top-width: 3px; border-right-width: 3px; }
  .corner.bl { bottom: 10px; left: 10px; border-bottom-width: 3px; border-left-width: 3px; }
  .corner.br { bottom: 10px; right: 10px; border-bottom-width: 3px; border-right-width: 3px; }
  .flashfx { position: absolute; inset: 0; background: #fff; animation: flashout 0.45s ease-out forwards; pointer-events: none; z-index: 3; }
  @keyframes flashout { from { opacity: 1; } to { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .flashfx { animation: none; opacity: 0; } .stamp { animation: none; } }
  .stamp {
    position: absolute; z-index: 2; font-family: 'Black Han Sans', sans-serif;
    font-size: 52px; padding: 6px 26px; border: 4px solid; border-radius: 10px;
    transform: rotate(-8deg); animation: stampin 0.25s cubic-bezier(0.2, 1.6, 0.4, 1);
    background: rgba(13,15,20,0.55);
  }
  @keyframes stampin { from { transform: rotate(-8deg) scale(2); opacity: 0; } to { transform: rotate(-8deg) scale(1); opacity: 1; } }
  .stamp.pass { color: var(--pass); border-color: var(--pass); }
  .stamp.fail { color: var(--fail); border-color: var(--fail); }
  .judging-txt {
    position: absolute; z-index: 2; font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; color: var(--flash); background: rgba(13,15,20,0.7);
    padding: 8px 16px; border-radius: 20px; animation: blink 1.1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .verdictbox {
    width: 100%; max-width: 420px; background: #1E222C; border: 1px solid #2A2F3B;
    border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; font-size: 14px; line-height: 1.65;
  }
  .verdictbox .seen { color: var(--dim); font-size: 13px; margin-top: 4px; }
  .btnrow { width: 100%; max-width: 420px; display: flex; gap: 10px; }
  button {
    flex: 1; border: none; border-radius: 12px; padding: 16px 0;
    font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: transform 0.08s ease;
  }
  button:active { transform: scale(0.97); }
  button:focus-visible { outline: 3px solid var(--flash); outline-offset: 2px; }
  .btn-primary { background: var(--flash); color: var(--ink); }
  .btn-pass { background: var(--pass); color: var(--ink); }
  .btn-ghost { background: #2A2F3B; color: var(--paper); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .fin { width: 100%; max-width: 420px; text-align: center; padding: 48px 16px; flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .fin h1 { font-family: 'Black Han Sans', sans-serif; font-size: 40px; color: var(--flash); margin-bottom: 12px; }
  .fin p { color: var(--dim); line-height: 1.7; }
  .note { width: 100%; max-width: 420px; margin-top: 20px; font-size: 11px; color: var(--dim); line-height: 1.6; text-align: center; }
  .hidden { display: none !important; }
  .widebtn { width: 100%; max-width: 260px; margin: 0 auto; display: block; }
  .modelist { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; margin: 0 auto; }
  .modebtn { width: 100%; }
  .soon { font-size: 11px; color: var(--dim); margin-left: 6px; }
  .clearbadge {
    display: inline-block; margin-left: 8px; vertical-align: middle;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1px;
    background: var(--pass); color: var(--ink); padding: 2px 8px; border-radius: 10px;
  }
  /* 도트 고양이 보상 */
  .cat-svg { image-rendering: pixelated; overflow: visible; display: block; margin: 0 auto; }
  .petB { opacity: 0; }
  .cat-anim .petA { animation: petflipA 0.9s steps(1) infinite; }
  .cat-anim .petB { animation: petflipB 0.9s steps(1) infinite; }
  @keyframes petflipA { 0%,49.9% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes petflipB { 0%,49.9% { opacity: 0; } 50%,100% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .cat-anim .petA, .cat-anim .petB { animation: none; } .petB { opacity: 0; } }
  .catgrid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 372px; margin: 0 auto; }
  .catslot { background: #1E222C; border: 1px solid #2A2F3B; border-radius: 12px; padding: 10px 6px 8px; width: 110px; }
  .catslot .cat-svg { width: 80px; height: 80px; }
  .catslot .cname { font-size: 12px; margin-top: 6px; color: var(--paper); }
  .catslot .clocked { font-size: 11px; color: var(--dim); margin-top: 6px; }
  #finCat .cat-svg { width: 150px; height: 150px; }
  #finCatName { font-family: 'Black Han Sans', sans-serif; color: var(--flash); font-size: 22px; margin: 6px 0 16px; }
  /* 타이틀 — 아이폰 카메라 UI */
  #titleScreen, #game, .camscreen { flex: 1 1 auto; min-height: 0; width: 100%; max-width: 420px; display: flex; flex-direction: column; overflow: hidden; padding: 0; }
  .sel { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 26px; text-align: center; }
  .sel-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--dim); }
  .sel-title { font-family: 'Black Han Sans', sans-serif; font-size: 34px; color: var(--flash); margin-top: 4px; }
  .sel-sub { font-size: 13px; color: var(--dim); margin-top: 6px; margin-bottom: 22px; }
  .sel-list { display: flex; flex-direction: column; gap: 11px; width: 100%; max-width: 300px; }
  .selbtn { width: 100%; flex: none; background: #1b202b; border: 1px solid #2b3240; color: var(--paper); font-weight: 700; font-size: 17px; padding: 15px 0; border-radius: 14px; }
  .selbtn:active { transform: scale(0.98); }
  .cam-bottom.sel-bottom { display: flex; align-items: center; justify-content: flex-end; padding: 14px 26px; }
  /* 게임 카드 레이아웃 */
  #game { align-items: center; padding: 4px 16px 12px; gap: 11px; }
  #game .cam-island { padding: 4px 0 0; }
  #game .counter { margin: 0; }
  #game .themecard { margin: 0; }
  #game .frame { flex: 1 1 auto; min-height: 0; margin: 0; aspect-ratio: auto; }
  #game .verdictbox { margin: 0; }
  .gbtns { width: 100%; max-width: 420px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; min-height: 96px; }
  .gbtns .gleft { grid-column: 1; justify-self: start; margin-left: 16px; }
  .gbtns .gcenter { grid-column: 2; justify-self: center; }
  .gbtns #gameBack { grid-column: 3; justify-self: end; margin-right: 26px; }
  .cam { position: relative; flex: 1 1 auto; min-height: 0; width: 100%; margin: 0 auto; border-radius: 16px; overflow: hidden; background: #000; display: flex; flex-direction: column; }
  .cam-island { display: flex; justify-content: center; padding: 9px 0 5px; }
  .cam-island .pill { width: 96px; height: 22px; background: #000; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .cam-island .pill .g { width: 9px; height: 9px; border-radius: 50%; background: #37d34a; }
  .cam-view { position: relative; flex: 1 1 auto; min-height: 0; background: radial-gradient(150% 100% at 62% 28%, #14171d 0%, #000 72%); }
  .cam-ctrls { position: absolute; top: 14px; right: 12px; display: flex; align-items: center; gap: 15px; background: rgba(30,30,34,0.82); padding: 7px 13px; border-radius: 18px; font-size: 16px; line-height: 1; }
  .cam-ctrls .moon { display: flex; align-items: center; gap: 2px; background: var(--flash); color: #3a2e00; border-radius: 11px; padding: 2px 7px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; }
  .cam-ctrls .ic { color: #ececf0; opacity: 0.92; }
  .cam-hero { position: absolute; left: 0; right: 0; top: calc(33% + 40px); transform: translateY(-50%); text-align: center; z-index: 1; }
  .cam-logo { font-family: 'Black Han Sans', sans-serif; font-size: 36px; color: var(--flash); letter-spacing: 1px; -webkit-text-stroke: 1.4px var(--flash); text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
  .cam-cam { width: 170px; height: auto; margin-top: 20px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
  .cam-zoom { position: absolute; left: 0; right: 0; bottom: 16px; display: flex; justify-content: center; align-items: center; gap: 16px; color: #fff; font-size: 13px; }
  .cam-zoom .z { opacity: 0.82; }
  .cam-zoom .z.on { background: rgba(0,0,0,0.5); color: var(--flash); font-weight: 700; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .cam-bottom { background: #000; padding: 14px 0 12px; }
  .cam-mode { display: flex; justify-content: center; gap: 20px; font-size: 18px; margin-bottom: 16px; }
  .cam-mode .cmode { color: #9a9aa2; font-weight: 700; cursor: pointer; padding: 4px 17px; border: 1px solid transparent; border-radius: 15px; user-select: none; }
  .cam-mode .cmode.on { color: var(--flash); border-color: rgba(255,211,56,0.55); }
  .cam-actions { display: flex; align-items: center; justify-content: space-between; padding: 0 26px; }
  .cam-thumb { width: 52px; height: 52px; border-radius: 10px; overflow: hidden; background: linear-gradient(160deg, #f3eddd 0%, #d9cfb8 100%); border: 1px solid #4a4a52; padding: 0; flex: none; cursor: pointer; }
  .cam-thumb .cat-svg { width: 100%; height: 100%; }
  .shutter { width: 78px; height: 78px; border-radius: 50%; padding: 0; flex: none; background: transparent; border: none; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; animation: shutterpulse 2.4s ease-in-out infinite; }
  .shutter::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid #fff; }
  .shutter::after { content: ''; position: absolute; inset: 5px; border-radius: 50%; background: #fff; transition: transform 0.08s; }
  .shutter .scap { position: relative; z-index: 2; color: var(--ink); font-family: 'Black Han Sans', sans-serif; font-size: 17px; }
  .shutter:active::after { transform: scale(0.9); }
  @keyframes shutterpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } 50% { box-shadow: 0 0 0 7px rgba(255,255,255,0.12); } }
  .cam-flip { width: 44px; height: 44px; border-radius: 50%; background: #2a2a2e; border: none; color: #fff; font-size: 19px; flex: none; display: flex; align-items: center; justify-content: center; }
  .cam-flip:disabled { opacity: 1; cursor: default; }
  .cam-date { position: absolute; top: 14px; left: 16px; z-index: 4; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.72); letter-spacing: 1px; }
  .shootbtn { width: 78px; height: 78px; border-radius: 50%; padding: 0; flex: none; background: transparent; border: none; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; animation: shutterpulse 2.4s ease-in-out infinite; }
  .shootbtn::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid #fff; }
  .shootbtn::after { content: ''; position: absolute; inset: 5px; border-radius: 50%; background: #fff; transition: transform 0.08s; }
  .shootbtn:active::after { transform: scale(0.9); }
  .shootbtn .scap { position: relative; z-index: 2; color: var(--ink); font-family: 'Black Han Sans', sans-serif; font-size: 17px; }
  .pill { flex: none; padding: 13px 22px; border-radius: 24px; font-size: 15px; white-space: nowrap; }
  .cam .verdictbox { max-width: none; width: auto; margin: 12px 14px 2px; }
  @media (prefers-reduced-motion: reduce) { .shutter, .shootbtn { animation: none; } }
</style>
</head>
<body>
  <div class="topbar hidden" id="topbar">
    <div class="topbar-left">
      <button class="backbtn hidden" id="btnBack">← 뒤로</button>
      <div class="logo">오늘의 찰칵</div>
    </div>
    <div class="datechip" id="datechip"></div>
  </div>

  <div id="titleScreen" class="fin">
    <div class="cam">
      <div class="cam-island"><div class="pill"><span class="g"></span></div></div>
      <div class="cam-view">
        <div class="cam-date js-date"></div>
        <div class="cam-ctrls">
          <span class="moon">☾5</span>
          <span class="ic">⚡</span>
          <span class="ic">◉</span>
        </div>
        <div class="cam-hero">
          <div class="cam-logo">오늘의 찰칵</div>
          <svg class="cam-cam" viewBox="0 0 104 80" aria-label="사진기">
            <rect x="40" y="8" width="24" height="12" rx="3" fill="#F6F5F0"/>
            <rect x="6" y="18" width="92" height="56" rx="10" fill="#F6F5F0"/>
            <rect x="16" y="27" width="13" height="8" rx="2" fill="#FFD338"/>
            <circle cx="82" cy="30" r="3.5" fill="#15181F"/>
            <circle cx="52" cy="47" r="18" fill="#15181F"/>
            <circle cx="52" cy="47" r="12" fill="#FFD338"/>
            <circle cx="52" cy="47" r="5" fill="#15181F"/>
            <circle cx="47" cy="42" r="3" fill="#FFFFFF" opacity="0.85"/>
          </svg>
        </div>
        <div class="cam-zoom"><span class="z">.5</span><span class="z on">1×</span><span class="z">2</span></div>
      </div>
      <div class="cam-bottom">
        <div class="cam-mode"><span class="cmode on" id="tabBasic">기본</span><span class="cmode" id="tabCat">주제별</span></div>
        <div class="cam-actions">
          <button class="cam-thumb" id="btnCollection" aria-label="컬렉션 보기"></button>
          <button class="shutter" id="btnStart"><span class="scap">시작</span></button>
          <button class="cam-flip" type="button" aria-label="전환" disabled>⟳</button>
        </div>
      </div>
    </div>
  </div>


  <div id="catScreen" class="camscreen hidden">
    <div class="cam">
      <div class="cam-island"><div class="pill"><span class="g"></span></div></div>
      <div class="cam-view sel-view">
        <div class="cam-date js-date"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="sel">
          <div class="sel-eyebrow">SELECT · 장소</div>
          <h2 class="sel-title">카테고리</h2>
          <p class="sel-sub">장소를 고르세요</p>
          <div class="sel-list">
            <button class="selbtn" id="btnCatOffice">회사</button>
            <button class="selbtn" id="btnCatSchool">학교</button>
            <button class="selbtn" id="btnCatHome">집</button>
            <button class="selbtn" id="btnCatCafe">카페</button>
            <button class="selbtn" id="btnCatStreet">길거리</button>
          </div>
        </div>
      </div>
      <div class="cam-bottom sel-bottom">
        <button class="cam-flip" id="catBack" type="button" aria-label="뒤로">⟳</button>
      </div>
    </div>
  </div>

  <div id="catDiffScreen" class="camscreen hidden">
    <div class="cam">
      <div class="cam-island"><div class="pill"><span class="g"></span></div></div>
      <div class="cam-view sel-view">
        <div class="cam-date js-date"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="sel">
          <div class="sel-eyebrow">SELECT · 난이도</div>
          <h2 class="sel-title" id="catDiffTitle">난이도</h2>
          <p class="sel-sub">난이도별 주제 10개에 도전</p>
          <div class="sel-list">
            <button class="selbtn" id="btnCatEasy">쉬움<span class="clearbadge hidden">CLEAR</span></button>
            <button class="selbtn" id="btnCatHard">어려움<span class="clearbadge hidden">CLEAR</span></button>
          </div>
        </div>
      </div>
      <div class="cam-bottom sel-bottom">
        <button class="cam-flip" id="catDiffBack" type="button" aria-label="뒤로">⟳</button>
      </div>
    </div>
  </div>

  <div id="game" class="hidden">
    <div class="cam-island"><div class="pill"><span class="g"></span></div></div>
    <div class="counter">
      <div class="counter-num" id="stageNum">01</div>
      <div class="counter-meta">
        <div class="counter-label">STAGE</div>
        <div class="tier" id="tier">기본 · 오늘의 랜덤</div>
        <div class="best">오늘 최고 기록 <b id="bestNum">0</b>단계</div>
        <div class="fails hidden" id="failCount">실패 <b id="failNum">0</b> / <span id="failLimit">3</span> <span class="failscope" id="failScopeLabel"></span></div>
      </div>
    </div>
    <div class="themecard">
      <div class="themecard-head">
        <div class="eyebrow">지금 찾을 것</div>
        <div class="progress hidden" id="progress">0/10</div>
      </div>
      <h1 id="themeText"></h1>
    </div>
    <div class="frame" id="frame">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="empty" id="emptyMsg">주제에 맞는 걸 찾아서<br />카메라로 찍어 보세요</div>
      <video id="camVideo" class="hidden" playsinline autoplay muted></video>
      <img id="photoImg" class="hidden" alt="제출한 사진" />
      <div class="judging-txt hidden" id="judgingTxt">AI 심판 판정 중…</div>
      <div class="stamp pass hidden" id="stampPass">통과</div>
      <div class="stamp fail hidden" id="stampFail">탈락</div>
    </div>
    <div class="verdictbox hidden" id="verdictBox">
      <span id="verdictComment"></span>
      <div class="seen hidden" id="verdictSeen"></div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" />
    <div class="gbtns">
      <button class="btn-ghost pill gleft hidden" id="btnRetake">다시 찍기</button>
      <button class="btn-primary pill gleft hidden" id="btnRetry">다시 도전</button>

function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rand) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
const BASIC_PER_DAY = 10;
// 1970 기준 경과 일수 (같은 달력 날짜면 모두 동일)
function dayNumber() {
  const d = new Date();
  return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000);
}
// 그날의 10개: 풀 전체를 주기별로 섞어 하루치씩 잘라 씀 (한 주기 내 중복 없음)
function buildBasicThemes() {
  const perCycle = Math.floor(BASIC_POOL.length / BASIC_PER_DAY);
  const dn = dayNumber();
  const cycle = Math.floor(dn / perCycle);
  const dayInCycle = dn % perCycle;
  let seed = 0;
  const key = "basic" + cycle;
  for (const c of key) seed = (seed * 31 + c.charCodeAt(0)) | 0;
  const shuffled = seededShuffle(BASIC_POOL, mulberry32(seed));
  return shuffled.slice(dayInCycle * BASIC_PER_DAY, dayInCycle * BASIC_PER_DAY + BASIC_PER_DAY);
}

  try { return JSON.parse(localStorage.getItem(CLEARED_KEY) || "{}") || {}; }

function markCatCleared(clearKey) {
  const cleared = loadClearedCats();
  if (cleared[clearKey]) return false;
  cleared[clearKey] = true;
  try { localStorage.setItem(CLEARED_KEY, JSON.stringify(cleared)); } catch (e) {}
  return true;
}

    { c: "#5b7fb0", px: [[8,1],[9,1],[7,2],[8,2],[9,2],[6,3],[7,3],[8,3],[9,3],[6,4],[7,4],[8,4],[9,4],[10,4]] },
    { c: "#ffffff", px: [[10,1]] },
  ],
  cafe: [ // 옆에 놓인 큰 뼈다귀 (양끝 혹 + 가운데 대)
    { c: "#f4efe2", px: [
      [0,13],[1,13],[6,13],[7,13],
      [0,14],[1,14],[2,14],[3,14],[4,14],[5,14],[6,14],[7,14],
      [0,15],[1,15],[6,15],[7,15],
    ] },
    { c: "#cbbfa6", px: [[0,15],[1,15],[6,15],[7,15]] },
  ],
  street: [ // 빨간 목도리
    { c: "#e0574f", px: [[4,10],[5,10],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10],[5,11],[6,11]] },
  ],
};
// 업로드된 픽셀 펫 스프라이트 (16×16). 머리 공유 + 몸통, 마지막 열에 꼬리 오버레이
const _PHEAD = [
  "................",
  "..KOK......KOK..",
  ".KOPOK....KOPOK.",
  "......KOOK......",
  "....KOOOOOOK....",
  "..KOOOOOOOOOOK..",
  ".KOBBOOOOOOBBOK.",
  ".KOBHOOOOOOHBOK.",
  ".KOOOOWWWWOOOOK.",
  "..KOOWWNNWWOOK..",
];
const _PBODY = [
  "...KOWWWWWWOK...",
  ".KOOOWWWWWWOOOK.",
  ".KOOOWWWWWWOOOK.",
  "..KOWWWWWWWWOK..",
  "...K..K..K..K...",
  "...O..O..O..O...",
];
// 꼬리: 15열(오른쪽 끝)에 rows 9-13 덮어쓰기 (down / up 두 프레임)
function _petTail(rows, up) {
  const out = rows.slice();
  const seq = up ? { 9: "K", 10: "O", 11: "O", 12: "O", 13: "." }
                 : { 9: ".", 10: ".", 11: "O", 12: "O", 13: "K" };
  for (const rr in seq) { const y = +rr; out[y] = out[y].substring(0, 15) + seq[rr]; }
  return out;
}
function _petColors(style, locked) {
  if (locked) return { ".": null, K: "#20242e", O: "#333846", D: "#333846", W: "#3a4150", P: "#333846", B: "#20242e", H: "#3a4150", N: "#20242e" };
  return { ".": null, K: style.X || "#4a2f1c", O: style.B, D: style.B, W: style.F, P: "#ffc2d1", B: "#241a17", H: "#ffffff", N: "#1a1210" };
}
function _petFrame(rows, cm) {
  const C = 10; let s = "";
  for (let y = 0; y < 16; y++) { const row = rows[y]; for (let x = 0; x < 16; x++) { const c = cm[row[x]]; if (!c) continue; s += `<rect x="${x*C}" y="${y*C}" width="${C}" height="${C}" fill="${c}"/>`; } }
  return s;
}

// 보상 펫 SVG. 색은 카테고리별, 소품 덧그림. petA/petB 프레임 전환으로 꼬리 흔들
function catSVG(catId, locked) {
  const cm = _petColors(CAT_STYLE[catId] || {}, locked);
  const base = _PHEAD.concat(_PBODY);
  const fA = _petFrame(_petTail(base, false), cm);
  const fB = _petFrame(_petTail(base, true), cm);
  const acc = locked ? "" : (CAT_ACC[catId] || []).map((grp) => grp.px.map(([x, y]) => `<rect x="${x*10}" y="${y*10}" width="10" height="10" fill="${grp.c}"/>`).join("")).join("");
  return `<svg class="cat-svg" viewBox="0 0 160 160"><g class="petA">${fA}</g><g class="petB">${fB}</g>${acc}</svg>`;
}

// 보상함 화면 렌더 — 획득=컬러 고양이, 미획득=자물쇠 실루엣
function renderCollection() {
  const cleared = loadClearedCats();
  els.catGrid.innerHTML = CAT_ORDER.map((cat) => {
    const label = CATEGORIES[cat].label;
    if (cleared[cat + "_hard"]) {
      return `<div class="catslot cat-anim">${catSVG(cat, false)}<div class="cname">${label} · ${CAT_NAME[cat]}</div></div>`;
    }
    return `<div class="catslot">${catSVG(cat, true)}<div class="clocked">🔒 ${label} 어려움</div></div>`;
  }).join("");
}

// 클리어 화면 — 어려움 클리어면 고양이 보상, 그 외엔 기본 ALL CLEAR
function renderFin(clearKey, newly) {
  const isCat = !!clearKey && clearKey.endsWith("_hard");
  els.finReward.classList.toggle("hidden", !isCat);
  els.finDefault.classList.toggle("hidden", isCat);
  if (isCat) {
    const cat = clearKey.replace("_hard", "");
    els.finCat.innerHTML = catSVG(cat, false);
    els.finTitle.textContent = newly ? "새 친구 획득!" : "다시 만났어요!";
    els.finCatName.textContent = CATEGORIES[cat].label + " · " + CAT_NAME[cat];
  }
}

// ─── 상태 ───
// run: 현재 판 설정 { tierPrefix, label, failLimit, failScope, saveKey, selectScreen }
let run = null, themes = [], stage = 1, best = 0, photoB64 = null, fails = 0, selectedCat = null;

// 기록 복원. 기본 모드는 날짜 바뀌면 리셋, 카테고리 모드(keepAcrossDays)는 계속 유지
function loadProgress() {
  stage = 1;
  best = 0;
  if (!run.saveKey) return;
  try {
    const saved = JSON.parse(localStorage.getItem(run.saveKey) || "null");
    if (saved && (run.keepAcrossDays || saved.date === todayKey())) {
      stage = Math.min(saved.stage || 1, themes.length + 1);
      best = saved.best || 0;
    }
  } catch (e) {}
}

function saveProgress() {
  if (!run.saveKey) return;
  try {
    localStorage.setItem(run.saveKey, JSON.stringify({ date: todayKey(), stage, best }));
  } catch (e) {}
}

// ─── DOM ───
const $ = (id) => document.getElementById(id);
const els = {
  date: $("datechip"), stageNum: $("stageNum"), tier: $("tier"), bestNum: $("bestNum"),
  failCount: $("failCount"), failNum: $("failNum"), failLimit: $("failLimit"), failScopeLabel: $("failScopeLabel"),
  theme: $("themeText"), progress: $("progress"), empty: $("emptyMsg"), img: $("photoImg"),
  judging: $("judgingTxt"), stampPass: $("stampPass"), stampFail: $("stampFail"),
  verdictBox: $("verdictBox"), verdictComment: $("verdictComment"), verdictSeen: $("verdictSeen"),
  file: $("fileInput"), frame: $("frame"), video: $("camVideo"),
  btnShoot: $("btnShoot"), btnCapture: $("btnCapture"), btnRetake: $("btnRetake"), btnSubmit: $("btnSubmit"),
  btnNext: $("btnNext"), btnRetry: $("btnRetry"),
  failMsg: $("failMsg"), btnFailBack: $("btnFailBack"),
  btnStart: $("btnStart"), tabBasic: $("tabBasic"), tabCat: $("tabCat"),
  btnCatOffice: $("btnCatOffice"), btnCatSchool: $("btnCatSchool"), btnCatHome: $("btnCatHome"),
  btnCatCafe: $("btnCatCafe"), btnCatStreet: $("btnCatStreet"),
  catDiffTitle: $("catDiffTitle"), btnCatEasy: $("btnCatEasy"), btnCatHard: $("btnCatHard"),
  btnCollection: $("btnCollection"), btnFinCollection: $("btnFinCollection"),
  finReward: $("finReward"), finDefault: $("finDefault"), finTitle: $("finTitle"),
  finCat: $("finCat"), finCatName: $("finCatName"), catGrid: $("catGrid"),
  btnBack: $("btnBack"),
};
els.date.textContent = todayKey();
document.querySelectorAll(".js-date").forEach((e) => { e.textContent = todayKey(); });

// ─── 화면 전환 ───
const SCREENS = { title: "titleScreen", cat: "catScreen", catdiff: "catDiffScreen", game: "game", fin: "finScreen", fail: "failScreen", collection: "collectionScreen" };
let currentScreen = "title";

function showScreen(name) {
  Object.values(SCREENS).forEach((id) => $(id).classList.add("hidden"));
  $(SCREENS[name]).classList.remove("hidden");
  currentScreen = name;
  els.btnBack.classList.toggle("hidden", name === "title");
  $("topbar").classList.toggle("hidden", ["title", "game", "cat", "catdiff"].includes(name));
  if (name === "catdiff") renderCatDiffBadges();
  if (name === "collection") renderCollection();
}

function goBack() {
  if (currentScreen === "cat") {
    showScreen("title");
  } else if (currentScreen === "catdiff") {
    showScreen("cat");
  } else if (currentScreen === "collection") {
    showScreen("title");
  } else if (currentScreen === "game") {
    stopCamera();
    showScreen(run.selectScreen);
  } else if (currentScreen === "fin" || currentScreen === "fail") {
    showScreen(run.selectScreen);
  }
}
els.btnBack.onclick = goBack;

function showButtons(...ids) {
  ["btnShoot", "btnCapture", "btnRetake", "btnSubmit", "btnNext", "btnRetry"].forEach((k) => {
    els[k].classList.toggle("hidden", !ids.includes(k));
  });
}

function render(phase) {
  if (stage > themes.length) {
    const newly = run.clearKey ? markCatCleared(run.clearKey) : false;
    renderFin(run.clearKey, newly);
    showScreen("fin");
    return;
  }
  els.stageNum.textContent = String(stage).padStart(2, "0");
  els.tier.textContent = run.tierPrefix + " · " + run.label;
  els.bestNum.textContent = best;
  els.theme.textContent = themes[stage - 1];

  // 진행상황 배지 (카테고리 모드): 통과한 개수 / 전체, 전부 통과하면 CLEAR
  els.progress.classList.toggle("hidden", !run.showProgress);
  if (run.showProgress) {
    const passed = phase === "pass" ? stage : stage - 1;
    const cleared = passed >= themes.length;
    els.progress.textContent = cleared ? "CLEAR" : passed + "/" + themes.length;
    els.progress.classList.toggle("clear", cleared);
  }

  const limit = run.failLimit;
  els.failCount.classList.toggle("hidden", limit === null);
  if (limit !== null) {
    els.failNum.textContent = fails;
    els.failLimit.textContent = limit;
    els.failScopeLabel.textContent = run.failScope === "stage" ? "(단계별)" : "(누적)";
  }

  els.judging.classList.toggle("hidden", phase !== "judging");
  els.stampPass.classList.toggle("hidden", phase !== "pass");
  els.stampFail.classList.toggle("hidden", phase !== "fail");

  if (phase === "idle") {
    els.img.classList.add("hidden");
    els.video.classList.add("hidden");
    els.empty.classList.remove("hidden");
    els.verdictBox.classList.add("hidden");
    showButtons("btnShoot");
  } else if (phase === "camera") {
    els.img.classList.add("hidden");
    els.video.classList.remove("hidden");
    els.empty.classList.add("hidden");
    els.verdictBox.classList.add("hidden");
    showButtons("btnCapture", "btnRetry");
  } else if (phase === "preview") {
    els.video.classList.add("hidden");
    els.img.classList.remove("hidden");
    els.empty.classList.add("hidden");
    showButtons("btnRetake", "btnSubmit");
  } else if (phase === "judging") {
    showButtons();
  } else if (phase === "pass") {
    showButtons("btnNext");
  } else if (phase === "fail" || phase === "error") {
    showButtons("btnRetry");
  }
}

function showVerdict(comment, seen) {
  els.verdictBox.classList.remove("hidden");
  els.verdictComment.textContent = comment || "";
  els.verdictSeen.classList.toggle("hidden", !seen);
  els.verdictSeen.textContent = seen ? "심판이 본 것: " + seen : "";
}

function flashFx() {
  const f = document.createElement("div");
  f.className = "flashfx";
  els.frame.appendChild(f);
  setTimeout(() => f.remove(), 500);
}

// ─── 이미지 리사이즈 ───
function resizeImage(file, maxSide) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.85).split(",")[1]);
      };
      img.onerror = () => reject(new Error("이미지를 불러오지 못했습니다"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("파일을 읽지 못했습니다"));
    reader.readAsDataURL(file);
  });
}

// ─── 카메라(웹캠) ───
let camStream = null;

function stopCamera() {
  if (camStream) {
    camStream.getTracks().forEach((t) => t.stop());
    camStream = null;
  }
  els.video.srcObject = null;
}

// 웹캠 있으면 실시간 캡처, 없으면(권한 거부·미지원 등) 파일 선택으로 폴백
async function startShoot() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    els.file.click();
    return;
  }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }, audio: false,
    });
    els.video.srcObject = camStream;
    render("camera");
  } catch (err) {
    els.file.click();
  }
}

function captureFromVideo() {
  const vw = els.video.videoWidth, vh = els.video.videoHeight;
  if (!vw || !vh) return null;
  const maxSide = 900;
  const scale = Math.min(1, maxSide / Math.max(vw, vh));
  const canvas = document.createElement("canvas");
  canvas.width = Math.round(vw * scale);
  canvas.height = Math.round(vh * scale);
  canvas.getContext("2d").drawImage(els.video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL("image/jpeg", 0.85).split(",")[1];
}

// ─── 이벤트 ───
els.btnShoot.onclick = startShoot;
els.btnRetake.onclick = startShoot;

els.btnCapture.onclick = () => {
  const b64 = captureFromVideo();
  if (!b64) return;
  photoB64 = b64;
  stopCamera();
  els.img.src = "data:image/jpeg;base64," + photoB64;
  render("preview");
};

els.file.onchange = async (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = "";
  if (!file) return;
  try {
    photoB64 = await resizeImage(file, 900);
    els.img.src = "data:image/jpeg;base64," + photoB64;
    render("preview");
  } catch (err) {
    showVerdict("사진을 불러오지 못했어요.", "카메라로 직접 찍거나 JPEG 사진으로 다시 시도해 주세요.");
    render("error");
  }
};

els.btnSubmit.onclick = async () => {
  render("judging");
  flashFx();
  try {
    const r = await fetch("/api/judge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: photoB64, theme: themes[stage - 1] }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || "HTTP " + r.status);

    showVerdict(data.comment, data.seen);
    if (data.match) {
      best = Math.max(best, stage);
      saveProgress();
      render("pass");
    } else {
      const limit = run.failLimit;
      if (limit !== null) {
        fails += 1;
        if (fails >= limit) {
          endGameOver();
          return;
        }
      }
      render("fail");
    }
  } catch (err) {
    showVerdict("⚠️ 시스템 오류 — 판정 자체를 못 했어요 (탈락이 아닙니다).", err.message);
    render("error");
  }
};

function endGameOver() {
  els.failMsg.innerHTML =
    stage + "단계에서 실패했어요.<br />(" + run.label +
    " · " + run.failLimit + "번 실패로 종료)";
  stopCamera();
  photoB64 = null;
  showScreen("fail");
}

els.btnNext.onclick = () => {
  stage += 1;
  photoB64 = null;
  if (run.failScope === "stage") fails = 0;
  saveProgress();
  render("idle");
};

els.btnRetry.onclick = () => {
  photoB64 = null;
  stopCamera();
  render("idle");
};

let selectedMode = "basic";
function setMode(m) {
  selectedMode = m;
  els.tabBasic.classList.toggle("on", m === "basic");
  els.tabCat.classList.toggle("on", m === "cat");
}
els.tabBasic.onclick = () => setMode("basic");
els.tabCat.onclick = () => setMode("cat");
els.btnStart.onclick = () => { if (selectedMode === "cat") showScreen("cat"); else startBasic(); };
els.btnCollection.onclick = () => showScreen("collection");
els.btnFinCollection.onclick = () => showScreen("collection");


function startRun(cfg, themeList) {
  run = cfg;
  themes = themeList;
  loadProgress();
  fails = 0;
  showScreen("game");
  render("idle");
}

function startBasic() {
  startRun({
    tierPrefix: "기본", label: "오늘의 랜덤",
    failLimit: null, failScope: null, showProgress: true,
    saveKey: "chalkak_basic", selectScreen: "title",
  }, buildBasicThemes());
}

function startCategory(cat, diff) {
  startRun({
    tierPrefix: CATEGORIES[cat].label, label: CAT_DIFFS[diff],
    failLimit: null, failScope: null, showProgress: true, keepAcrossDays: true,
    clearKey: cat + "_" + diff, saveKey: "chalkak_catprog_" + cat + "_" + diff, selectScreen: "catdiff",
  }, CATEGORIES[cat][diff].slice(0, CAT_STAGE_COUNT));
}


function selectCategory(cat) {
  selectedCat = cat;
  els.catDiffTitle.textContent = CATEGORIES[cat].label;
  showScreen("catdiff");
}
els.btnCatOffice.onclick = () => selectCategory("office");
els.btnCatSchool.onclick = () => selectCategory("school");
els.btnCatHome.onclick = () => selectCategory("home");
els.btnCatCafe.onclick = () => selectCategory("cafe");
els.btnCatStreet.onclick = () => selectCategory("street");

els.btnCatEasy.onclick = () => startCategory(selectedCat, "easy");
els.btnCatHard.onclick = () => startCategory(selectedCat, "hard");

els.btnFailBack.onclick = () => showScreen(run.selectScreen);
$("gameBack").onclick = goBack;
$("catBack").onclick = goBack;
$("catDiffBack").onclick = goBack;

// 타이틀 갤러리 썸네일에 강아지 스프라이트 표시
els.btnCollection.innerHTML = catSVG("office", false);
</script>
